<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotify Auth Code</title>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; text-align: center; }
  #code { font-size: 1.1em; word-break: break-all; background: #f0f0f0; padding: 12px; border-radius: 6px; margin: 20px 0; }
  button { padding: 10px 20px; font-size: 1em; cursor: pointer; }
  #error { color: #c0392b; }
</style>
</head>
<body>
  <h2>Spotify Authorization</h2>
  <div id="result">Reading URL...</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const error = params.get("error");
    const resultDiv = document.getElementById("result");

    if (error) {
      resultDiv.innerHTML = '<p id="error">Spotify returned an error: ' + error + '</p>';
    } else if (code) {
      resultDiv.innerHTML =
        '<p>Copy this code and paste it into your ESP32 setup page:</p>' +
        '<div id="code">' + code + '</div>' +
        '<button onclick="copyCode()">Copy to clipboard</button>' +
        '<p id="copied" style="display:none;color:green;">Copied!</p>';
    } else {
      resultDiv.innerHTML = '<p id="error">No code found in the URL. Did you get here directly from a Spotify login redirect?</p>';
    }

    function copyCode() {
      navigator.clipboard.writeText(code).then(() => {
        document.getElementById("copied").style.display = "block";
      });
    }
  </script>
</body>
</html>
